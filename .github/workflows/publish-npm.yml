name: Publish npm CLI

on:
  push:
    tags: ["cli-v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"

      - name: Test npm CLI
        run: npm test
        working-directory: packages/mcp-surveys-npx

      - name: Publish npm CLI
        run: npm publish --provenance --registry https://registry.npmjs.org/
        working-directory: packages/mcp-surveys-npx
