name: Publish npm CLI

on:
  push:
    tags: ["cli-v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"

      - name: Test npm CLI
        run: npm test
        working-directory: packages/mcp-surveys-npx

      - name: Check npm version
        id: npm-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "mcp-surveys-cli@$VERSION" version --registry https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: packages/mcp-surveys-npx

      - name: Publish npm CLI
        if: steps.npm-version.outputs.exists != 'true'
        run: npm publish --provenance --access public --registry https://registry.npmjs.org/
        working-directory: packages/mcp-surveys-npx
