name: Publish CLI

on:
  push:
    tags: ["cli-v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Build CLI
        run: uv build packages/mcp-surveys-cli --out-dir dist/cli --no-sources

      - name: Publish CLI
        run: uv publish --trusted-publishing always dist/cli/*
